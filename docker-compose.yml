version: "3.9"

services:
  backend:
    build: ./backend
    container_name: cafe_backend

  db:
    image: postgres:15
    container_name: cafe_db
    environment:
      POSTGRES_DB: cafe
      POSTGRES_USER: cafeuser
      POSTGRES_PASSWORD: cafepass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    image: nginx:latest
    container_name: cafe_front
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  postgres_data:
